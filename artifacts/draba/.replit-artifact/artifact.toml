kind = "web"
previewPath = "/"
title = "Draba"
version = "1.0.0"
id = "artifacts/draba"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20344

[services.development]
run = "pnpm --filter @workspace/draba run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/draba", "run", "build" ]
publicDir = "artifacts/draba/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20344"
BASE_PATH = "/"
